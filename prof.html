<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>

    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Itim', cursive;
        }

        body {
            background: #f4f6f9;
            color: #111;
            transition: 0.4s;
        }

        /* ===== HEADER ===== */
        .header {
            height: 90px;
            padding: 0 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(246, 247, 248, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 28px;
        }

        nav {
            display: flex;
            gap: 36px;
        }

        nav a {
            text-decoration: none;
            color: #111;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            transition: 0.4s;

        }

        nav a::after {
            content: "";
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 0;
            height: 2px;

            transition: 0.3s;
        }

        nav a:hover {
            color: grey;

        }

        .logout {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
        }


        .dark {
            background: #1e1f25;
            color: #e4e6eb;
        }

        .container {
            width: 95%;
            max-width: 1300px;
            margin: 40px auto;
        }

        /* MODE BUTTON */
        .mode-toggle {
            text-align: right;
            margin-bottom: 20px;
        }

        .mode-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin-left: 10px;
            font-size: 16px;
        }

        .white-btn {
            background: #ffffff;
            border: 1px solid #ddd;
        }

        .dark-btn {
            background: #2c2f36;
            color: #fff;
        }

        /* NO ACCOUNT */
        .no-account {
            text-align: center;
            padding: 100px;
            background: #fff;
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }

        .dark .no-account {
            background: #2a2c33;
        }

        /* FORM */
        .form-box {
            display: none;
            padding: 50px;
            background: #fff;
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }

        .dark .form-box {
            background: #2a2c33;
        }

        .form-box input,
        .form-box textarea,
        .form-box select {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 15px;
            border: 1px solid #ddd;
            font-size: 16px;
        }

        .dark .form-box input,
        .dark .form-box textarea,
        .dark .form-box select {
            background: #3a3d46;
            border: 1px solid #444;
            color: #fff;
        }

        /* PROFILE CARD */
        .profile-card {
            display: none;
            margin-top: 30px;
            padding: 60px;
            min-height: 600px;
            background: #fff;
            border-radius: 35px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.08);
        }

        .dark .profile-card {
            background: #2a2c33;
        }

        .profile-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .search {
            margin-bottom: 25px;
        }

        .search input {
            width: 100%;
            padding: 15px;
            border-radius: 20px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        .dark .search input {
            background: #3a3d46;
            border: 1px solid #444;
            color: #fff;
        }

        /* AI GRID */
        .ai-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .ai-card {
            padding: 25px;
            border-radius: 20px;
            background: #f0f2f5;
            transition: 0.3s;
        }

        .dark .ai-card {
            background: #3a3d46;
        }

        .ai-card:hover {
            transform: translateY(-6px);
        }

        .ai-card h3 {
            margin-bottom: 10px;
        }

        .ai-card a {
            text-decoration: none;
            color: #0077ff;
            font-weight: bold;
        }

        .dark .ai-card a {
            color: #4da3ff;
        }

        .btn {
            padding: 14px 35px;
            border: none;
            border-radius: 30px;
            background: #0077ff;
            color: #fff;
            cursor: pointer;
            font-size: 16px;
        }   
    </style>
</head>

<body>

    <div class="container">



        <header class="header">
            <h2 class="logo">SoftMind</h2>
            <nav>
                <a id="asos" href="index.html"><i class="fa-regular fa-compass"></i> Asosiy</a>

                <a id="bosh" href="home.html" class="active">
                    <i class="fa-solid fa-house"></i> Bosh sahifa
                </a>
                <a id="bosh" href="./prof.html" class="active">
                    <i class="fa-solid fa-user"></i>Profile
                </a>
                <a href="./profil.html"><i class="fa-solid fa-table"></i>Statistik</a>
            </nav>

            <a href="./login.html"><button class="logout" onclick="logout()">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                </button></a>
        </header>




        <div class="no-account" id="noAccount">
            <h1>Sizda akkaunt yo‘q</h1>
            <br>
            <button class="btn" onclick="openForm()">Akkaunt yaratish</button>
        </div>

        <div class="form-box" id="formBox">
            <h2>Akkaunt yaratish</h2><br>
            <input type="text" id="name" placeholder="Ism">
            <input type="text" id="surname" placeholder="Familya">
            <input type="email" id="email" placeholder="Email">
            <textarea id="bio" rows="3" placeholder="O‘zingiz haqida qisqacha"></textarea>
            <select id="interest">
                <option value="">AI yo‘nalish</option>
                <option value="design">AI Design</option>
                <option value="coding">AI Coding</option>
                <option value="video">AI Video</option>
                <option value="chatbot">AI Chatbot</option>
            </select>
            <button class="btn" onclick="createProfile()">Yaratish</button>
        </div>

        <div class="profile-card" id="profileCard">
            <div class="profile-top">
                <div>
                    <h2 id="fullName"></h2>
                    <p id="bioText"></p>
                </div>
                <div id="emailText"></div>
            </div>

            <h4>Sizning qiziqishingizga mos AI lar </h4>

            <br>
            <br>

            <div class="search">
                <input type="text" id="searchInput" placeholder="AI qidirish..." onkeyup="searchAI()">
            </div>

            <div class="ai-grid" id="aiGrid"></div>
        </div>

    </div>

    <script>

        function setDark() {
            document.body.classList.add("dark");
        }

        function setLight() {
            document.body.classList.remove("dark");
        }

        function openForm() {
            document.getElementById("noAccount").style.display = "none";
            document.getElementById("formBox").style.display = "block";
        }

        let allAI = [];


        function createProfile() {

            const name = document.getElementById("name").value;
            const surname = document.getElementById("surname").value;
            const email = document.getElementById("email").value;
            const bio = document.getElementById("bio").value;
            const interest = document.getElementById("interest").value;

            if (!name || !surname || !email || !interest) {
                alert("Ma'lumotlarni to'ldiring");
                return;
            }

            document.getElementById("formBox").style.display = "none";
            document.getElementById("profileCard").style.display = "block";

            document.getElementById("fullName").innerText = name + " " + surname;
            document.getElementById("emailText").innerText = email;
            document.getElementById("bioText").innerText = bio;

            loadAI(interest);
        }

        function loadAI(type) {

            const aiList = {
                design: ["Midjourney", "Leonardo AI", "Adobe Firefly", "Canva AI", "DALL·E", "Playground AI", "BlueWillow", "NightCafe", "DreamStudio", "Runway Design", "Looka", "Khroma", "Uizard", "Visme AI", "Designs.ai"],
                coding: ["ChatGPT", "GitHub Copilot", "Codeium", "Tabnine", "Replit AI", "Amazon CodeWhisperer", "Cursor AI", "Sourcegraph Cody", "Blackbox AI", "Phind", "Mutable AI", "AskCodi", "Codiga", "DeepCode", "OpenAI API"],
                video: ["Runway ML", "Pika Labs", "Synthesia", "Descript", "Lumen5", "InVideo AI", "Fliki", "Kaiber", "HeyGen", "Colossyan", "Animoto", "Filmora AI", "Veed AI", "Kapwing AI", "DeepBrain"],
                chatbot: ["Dialogflow", "ManyChat", "Botpress", "Tidio AI", "Chatfuel", "Rasa", "Flow XO", "Landbot", "Collect.chat", "Drift AI", "Zoho SalesIQ", "IBM Watson", "Kore.ai", "Ada AI", "Intercom AI"]
            };

            allAI = aiList[type];
            renderAI(allAI);
        }

        function renderAI(list) {
            aiGrid.innerHTML = "";
            list.forEach(ai => {
                aiGrid.innerHTML += `
            <div class="ai-card">
                <h3>${ai}</h3>
                <a href="#" target="_blank">AI sahifasiga o'tish</a>
            </div>
        `;
            });
        }

        function searchAI() {
            const value = searchInput.value.toLowerCase();
            const filtered = allAI.filter(ai => ai.toLowerCase().includes(value));
            renderAI(filtered);
        }

    </script>

</body>

</html>
